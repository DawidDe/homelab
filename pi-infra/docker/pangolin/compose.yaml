---
services:
  pangolin:
    image: docker.io/fosrl/pangolin:ee-1.18.4
    container_name: pangolin
    read_only: true
    user: "1001:1001"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    volumes:
      - /opt/pangolin/config:/app/config
    networks:
      - pangolin
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/v1/"]
      interval: "10s"
      timeout: "10s"
      retries: 15
    deploy:
      resources:
        limits:
          memory: 1g
        reservations:
          memory: 256m
    restart: unless-stopped

  gerbil:
    image: docker.io/fosrl/gerbil:1.4.0
    container_name: gerbil
    cap_drop:
      - ALL
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    security_opt:
      - no-new-privileges:true
    volumes:
      - /opt/pangolin/config:/var/config
    networks:
      - pangolin
    ports:
      - 51820:51820/udp
      - 21280:21280/udp
      - 443:443
      - 80:80
    command:
      - --reachableAt=http://gerbil:3004
      - --generateAndSaveKeyTo=/var/config/key
      - --remoteConfig=http://pangolin:3001/api/v1/
    depends_on:
      pangolin:
        condition: service_healthy
    restart: unless-stopped

  traefik:
    image: docker.io/traefik:v3.6
    container_name: traefik
    read_only: true
    user: "1001:1001"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    volumes:
      - /opt/pangolin/traefik:/etc/traefik:ro
      - /opt/pangolin/config/letsencrypt:/letsencrypt:rw
      - /opt/pangolin/config/traefik/logs:/var/log/traefik:rw
    network_mode: service:gerbil
    command:
      - --configFile=/etc/traefik/traefik_config.yml
    depends_on:
      pangolin:
        condition: service_healthy
    restart: unless-stopped

  newt:
    image: fosrl/newt
    container_name: newt
    env_file:
      - .env
    networks:
      - pangolin
      - pocket-id
      - vault
      - omni
    restart: unless-stopped

networks:
  pangolin:
    name: pangolin
  pocket-id:
    external: true
  vault:
    external: true
  omni:
    external: true