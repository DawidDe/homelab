---
services:
  pocket-id:
    image: ghcr.io/pocket-id/pocket-id:v2
    container_name: pocket-id
    read_only: true
    user: "1001:1004"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    volumes:
      - "/opt/pocket-id/data:/app/data"
    env_file:
      - .env
    networks:
      - pocket-id
    healthcheck:
      test: [ "CMD", "/app/pocket-id", "healthcheck" ]
      interval: 1m30s
      timeout: 5s
      retries: 2
      start_period: 10s
    restart: unless-stopped

networks:
  pocket-id:
    name: pocket-id