---
services:
  vault:
    image: hashicorp/vault:latest
    container_name: vault
    read_only: true
    user: "1002:1005"
    cap_drop:
      - ALL
    cap_add:
      - IPC_LOCK
    security_opt:
      - no-new-privileges:true
    volumes:
      - ./config.hcl:/vault/config/config.hcl:ro
      - /opt/vault/data:/vault/data
      - /opt/vault/logs:/vault/logs
    environment:
      SKIP_CHOWN: true
      SKIP_SETCAP: true
    networks:
      - vault
    command: server
    restart: unless-stopped

networks:
  vault:
    name: vault