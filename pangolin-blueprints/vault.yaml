---
public-resources:
  vault:
    name: Vault
    protocol: http
    full-domain: vault.domain.de
    rules:
      - action: allow
        match: country
        value: DE
      - action: deny
        match: country
        value: ALL
    auth:
      sso-enabled: false
    targets:
      - site: Pi
        method: http
        hostname: vault
        port: 8200
        healthcheck:
          enabled: true
          hostname: vault
          port: 8200
          path: /v1/sys/health
          status: 200