public-resources:
  vault:
    name: Vault
    protocol: http
    full-domain: vault.domain.de
    rules:
      - action: allow
        match: country
        value: DE
      - action: deny
        match: country
        value: ALL
    auth:
      sso-enabled: true
    targets:
      - site: Pi
        method: http
        hostname: vault
        port: 8200