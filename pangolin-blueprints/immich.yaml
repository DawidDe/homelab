---
public-resources:
  vault:
    name: Immich
    protocol: http
    full-domain: immich.domain.de
    rules:
      - action: allow
        match: country
        value: DE
      - action: deny
        match: country
        value: ALL
    auth:
      sso-enabled: false
    targets:
      - site: kubernetes
        method: http
        hostname: immich-server.immich.svc.cluster.local
        port: 2283