---
private-resources:
  proxmox:
    name: Proxmox
    mode: http
    sites:
      - Pi
    scheme: https
    destination: 192.168.178.3
    destination-port: 8006
    full-domain: proxmox.domain.de
    ssl: true
    users:
      - user@example.com
  heimdall:
    name: Heimdall
    mode: cidr
    destination: 192.168.178.3/32
    sites:
      - Pi
    tcp-ports: "22"
    disable-icmp: false
    alias: heimdall.domain.de
    users:
      - user@example.com