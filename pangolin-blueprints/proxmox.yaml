---
public-resources:
  proxmox:
    name: Proxmox
    protocol: http
    full-domain: proxmox.domain.de
    rules:
      - action: allow
        match: country
        value: DE
      - action: deny
        match: country
        value: ALL
    auth:
      sso-enabled: false
    targets:
      - site: Pi
        method: https
        hostname: 192.168.178.3
        port: 8006

private-resources:
  heimdall:
    name: Heimdall
    mode: cidr
    destination: 192.168.178.3/32
    sites:
      - Pi
    tcp-ports: "22"
    disable-icmp: false
    alias: heimdall.domain.de
    users:
      - user@example.com