---
public-resources:
  jellyfin:
    name: Jellyfin
    protocol: http
    full-domain: jellyfin.domain.de
    rules:
      - action: allow
        match: country
        value: DE
      - action: deny
        match: country
        value: ALL
    auth:
      sso-enabled: true
    targets:
      - site: kubernetes
        method: http
        hostname: jellyfin.jellyfin.svc.cluster.local
        port: 8096