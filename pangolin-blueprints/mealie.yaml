---
public-resources:
  mealie:
    name: Mealie
    protocol: http
    full-domain: mealie.domain.de
    rules:
      - action: allow
        match: country
        value: DE
      - action: deny
        match: country
        value: ALL
    auth:
      sso-enabled: false
    targets:
      - site: Kubernetes
        method: http
        hostname: mealie.mealie.svc.cluster.local
        port: 9000