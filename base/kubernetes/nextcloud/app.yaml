---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nextcloud 
  namespace: argocd
spec:
  destination:
    namespace: nextcloud
    server: 'https://kubernetes.default.svc'
  sources:
  - repoURL: 'https://nextcloud.github.io/helm/'
    chart: nextcloud
    targetRevision: 9.2.0
    helm:
      valueFiles:
      - $values/nextcloud/values.yaml
  - repoURL: 'git@github.com:DawidDe/argocd-values.git'
    targetRevision: main
    ref: values
  - repoURL: 'https://github.com/dawidde/homelab.git'
    path: base/kubernetes/nextcloud/manifests
  project: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: false
      enabled: true
    syncOptions:
    - CreateNamespace=true
