---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: immich-db-secrets
  namespace: immich
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/sync-wave: "0"
spec:
  refreshInterval: "15s"
  secretStoreRef:
    name: vault-secret-store
    kind: ClusterSecretStore
  target:
    name: immich-db-secrets
  data:
    - secretKey: username
      remoteRef:
        key: kv/kubernetes/immich
        property: dbUser
    - secretKey: password
      remoteRef:
        key: kv/kubernetes/immich
        property: dbPassword