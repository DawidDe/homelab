---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: immich
  namespace: argocd
spec:
  destination:
    namespace: immich
    server: 'https://kubernetes.default.svc'
  sources:
  - repoURL: 'oci://ghcr.io/immich-app/immich-charts/immich'
    chart: immich
    targetRevision: 0.12.0
    helm:
      valueFiles:
      - $values/immich/values.yaml
  - repoURL: 'git@github.com:DawidDe/argocd-values.git'
    targetRevision: main
    ref: values
  - repoURL: 'https://github.com/dawidde/homelab.git'
    path: base/kubernetes/immich/manifests
  project: default
  syncPolicy:
    automated:
      prune: false
      selfHeal: false
      enabled: true
    syncOptions:
    - CreateNamespace=true
