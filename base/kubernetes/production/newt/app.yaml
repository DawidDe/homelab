---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: newt
  namespace: argocd
spec:
  destination:
    namespace: newt
    server: 'https://kubernetes.default.svc'
  sources:
  - repoURL: 'https://charts.fossorial.io'
    chart: newt
    targetRevision: 1.2.0
    helm:
      valueFiles:
      - $values/production/newt/values.yaml
  - repoURL: 'git@github.com:DawidDe/argocd-values.git'
    targetRevision: main
    ref: values
  project: default
  syncPolicy:
    automated:
      prune: false
      selfHeal: false
      enabled: true
    syncOptions:
    - CreateNamespace=true