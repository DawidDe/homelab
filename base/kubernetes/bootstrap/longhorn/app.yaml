---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: longhorn
  namespace: argocd
spec:
  destination:
    namespace: longhorn
    server: 'https://kubernetes.default.svc'
  sources:
  - repoURL: 'https://charts.longhorn.io/'
    chart: longhorn
    targetRevision: 1.11.0
    helm:
      valueFiles:
      - $values/bootstrap/longhorn/values.yaml
  - repoURL: 'git@github.com:DawidDe/argocd-values.git'
    targetRevision: main
    ref: values
  project: default
  syncPolicy:
    automated:
      prune: false
      selfHeal: false
      enabled: true
    syncOptions:
    - CreateNamespace=true