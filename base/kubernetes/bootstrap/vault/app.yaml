---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vault
  namespace: argocd
spec:
  destination:
    namespace: vault
    server: 'https://kubernetes.default.svc'
  sources:
  - repoURL: 'https://helm.releases.hashicorp.com/'
    chart: vault
    targetRevision: 3.0.0
    helm:
      valueFiles:
      - $values/bootstrap/jellyfin/values.yaml
  - repoURL: 'git@github.com:DawidDe/argocd-values.git'
    targetRevision: main
    ref: values
  project: default
  syncPolicy:
    automated:
      prune: false
      selfHeal: false
      enabled: true
    syncOptions:
    - CreateNamespace=true
