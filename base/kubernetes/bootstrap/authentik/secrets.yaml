apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: authentik-secrets
  namespace: authentik
spec:
  refreshInterval: "15s"
  secretStoreRef:
    name: vault-secret-store
    kind: ClusterSecretStore
  target:
    name: authentik-secrets
  data:
    - secretKey: AUTHENTIK_BOOTSTRAP_TOKEN
      remoteRef:
        key: bootstrap-cluster/authentik
        property: authentikBootstrapToken
    - secretKey: AUTHENTIK_BOOTSTRAP_PASSWORD
      remoteRef:
        key: bootstrap-cluster/authentik
        property: authentikBootstrapPassword
    - secretKey: AUTHENTIK_BOOTSTRAP_EMAIL
      remoteRef:
        key: bootstrap-cluster/authentik
        property: authentikBootstrapEmail