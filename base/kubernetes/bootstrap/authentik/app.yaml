---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: authentik
  namespace: argocd
spec:
  destination:
    namespace: 
    server: 'https://kubernetes.default.svc'
  sources:
  - repoURL: 'https://charts.goauthentik.io/'
    chart: authentik
    targetRevision: 2026.2.1
    helm:
      valueFiles:
      - $values/bootstrap/authentik/values.yaml
  - repoURL: 'git@github.com:DawidDe/argocd-values.git'
    targetRevision: main
    ref: values
  project: default
  syncPolicy:
    automated:
      prune: false
      selfHeal: false
      enabled: true
    syncOptions:
    - CreateNamespace=true