---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bitwarden
  namespace: argocd
spec:
  destination:
    namespace: bitwarden
    server: 'https://kubernetes.default.svc'
  sources:
  - repoURL: 'https://charts.bitwarden.com/'
    chart: self-host
    targetRevision: 1.1.6
    helm:
      valueFiles:
      - $values/production/bitwarden/values.yaml
  - repoURL: 'git@github.com:DawidDe/argocd-values.git'
    targetRevision: HEAD
    ref: values
  project: default
  syncPolicy:
    automated:
      prune: false
      selfHeal: false
      enabled: true
    syncOptions:
    - CreateNamespace=true